name: Palak
on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/greet
        with:
          name: Palak

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: echo "testing on node ${{ matrix.node-version }}"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir dist
          echo "hello from the build job" > dist/output.txt
          echo "<h1>Hello from GitHub Actions</h1>" > dist/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: my-build-output
          path: dist
